name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            asset: DBfock-${{ github.ref_name }}-macOS.zip
          - name: Windows
            os: windows-latest
            asset: DBfock-${{ github.ref_name }}-Windows.zip
          - name: Linux
            os: ubuntu-22.04
            asset: DBfock-${{ github.ref_name }}-Linux.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Build desktop app
        run: make build-desktop

      - name: Package macOS app
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent backend/build/bin/DBfock.app "dist/${{ matrix.asset }}"

      - name: Package Windows app
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Compress-Archive -Path backend/build/bin/DBfock.exe -DestinationPath "dist/${{ matrix.asset }}"

      - name: Package Linux app
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist package
          cp backend/build/bin/DBfock package/DBfock
          tar -czf "dist/${{ matrix.asset }}" -C package DBfock

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
